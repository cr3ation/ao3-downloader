{% extends "base.html" %}

{% block body %}
<main class="max-w-5xl mx-auto px-4 py-8">
  <header class="flex items-baseline justify-between mb-6">
    <h1 class="text-2xl font-bold text-white">Settings</h1>
    <a href="/" class="text-sm text-slate-400 hover:text-slate-200">&larr; Back to the app</a>
  </header>

  <div class="flex flex-col md:flex-row gap-8">
    <aside class="w-full md:w-56 shrink-0">
      <nav class="space-y-4 text-sm">
        <div>
          <p class="text-xs uppercase tracking-wide text-slate-500 px-3 mb-1">Accounts</p>
          <a href="/system/accounts"
             class="block px-3 py-2 rounded-md {% if active == 'accounts' %}bg-slate-800 text-white{% else %}text-slate-400 hover:text-slate-200 hover:bg-slate-800/50{% endif %}">Users</a>
        </div>
        <div>
          <p class="text-xs uppercase tracking-wide text-slate-500 px-3 mb-1">Security</p>
          <a href="/system/settings"
             class="block px-3 py-2 rounded-md {% if active == 'settings' %}bg-slate-800 text-white{% else %}text-slate-400 hover:text-slate-200 hover:bg-slate-800/50{% endif %}">Single sign-on</a>
        </div>
      </nav>
    </aside>

    <div class="flex-1 min-w-0 space-y-6">
      {% if ok %}
        <p class="bg-emerald-950/40 border border-emerald-900/60 text-emerald-300 text-sm rounded-lg px-3 py-2">{{ ok }}</p>
      {% endif %}
      {% if err %}
        <p class="bg-red-950/40 border border-red-900/60 text-red-300 text-sm rounded-lg px-3 py-2">{{ err }}</p>
      {% endif %}

      {% block system_body %}{% endblock %}
    </div>
  </div>
</main>
<script src="/static/system.js"></script>
{% endblock %}
