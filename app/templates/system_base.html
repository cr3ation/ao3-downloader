{% extends "base.html" %}

{% block body %}
<main class="max-w-4xl mx-auto px-4 py-8 space-y-6">
  <header class="flex items-baseline justify-between">
    <div>
      <h1 class="text-2xl font-bold text-white">System</h1>
      <p class="text-sm text-slate-400 mt-1">Accounts and single sign-on.</p>
    </div>
    <a href="/" class="text-sm text-slate-400 hover:text-slate-200">&larr; Back to the app</a>
  </header>

  <nav class="flex gap-1 border-b border-slate-800">
    <a href="/system/accounts"
       class="px-4 py-2 text-sm font-medium border-b-2 {% if active == 'accounts' %}border-indigo-500 text-white{% else %}border-transparent text-slate-400 hover:text-slate-200{% endif %}">Accounts</a>
    <a href="/system/settings"
       class="px-4 py-2 text-sm font-medium border-b-2 {% if active == 'settings' %}border-indigo-500 text-white{% else %}border-transparent text-slate-400 hover:text-slate-200{% endif %}">Settings</a>
  </nav>

  {% if ok %}
    <p class="bg-emerald-950/40 border border-emerald-900/60 text-emerald-300 text-sm rounded-lg px-3 py-2">{{ ok }}</p>
  {% endif %}
  {% if err %}
    <p class="bg-red-950/40 border border-red-900/60 text-red-300 text-sm rounded-lg px-3 py-2">{{ err }}</p>
  {% endif %}

  {% block system_body %}{% endblock %}
</main>
<script src="/static/system.js"></script>
{% endblock %}
