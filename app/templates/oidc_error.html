{% extends "base.html" %}
{% block title %}Sign-in failed · FicFetch{% endblock %}

{% block body %}
<main class="max-w-sm mx-auto px-4 pt-24 text-center">
  <div class="bg-slate-900 border border-slate-800 rounded-xl p-8">
    <h1 class="text-xl font-bold text-white mb-2">SSO sign-in failed</h1>
    <p class="text-sm text-slate-400 mb-5">{{ message }}</p>
    <a href="/login" class="inline-block bg-indigo-600 hover:bg-indigo-500 text-white text-sm rounded-lg px-5 py-2.5">Back to sign in</a>
  </div>
</main>
{% endblock %}
