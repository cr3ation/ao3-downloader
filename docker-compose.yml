services:
  ficfetch:
    build: .
    container_name: ficfetch
    ports:
      - "${PORT:-8067}:8000"
    volumes:
      # DOWNLOADS_PATH should point at the folder Calibre watches for automatic
      # adding. Only e-books are ever written there.
      - ${DOWNLOADS_PATH:-./downloads}:/app/downloads
      # App state (metadata.json). Keep this OUT of the Calibre watch folder.
      - ${CONFIG_PATH:-./config}:/app/config
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-Europe/Stockholm}"
      AO3_MIN_DELAY: "${AO3_MIN_DELAY:-3}"
      AO3_MAX_DELAY: "${AO3_MAX_DELAY:-6}"
      MAX_RETRIES: "${MAX_RETRIES:-5}"
      RETRY_BACKOFF_BASE: "${RETRY_BACKOFF_BASE:-30}"
      RETRY_BACKOFF_CAP: "${RETRY_BACKOFF_CAP:-600}"
      RETRY_AFTER_CAP: "${RETRY_AFTER_CAP:-1800}"
      REQUEST_TIMEOUT: "${REQUEST_TIMEOUT:-60}"
      MAX_RESULTS_CAP: "${MAX_RESULTS_CAP:-500}"
      MAX_PAGES: "${MAX_PAGES:-50}"
      EPUB_TAG: "${EPUB_TAG:-Fanfiction}"
      FLAT_DOWNLOADS: "${FLAT_DOWNLOADS:-true}"
      COVER_GENERATION_ENABLED: "${COVER_GENERATION_ENABLED:-true}"
      # Accounts & sessions. ADMIN_* are used only to seed the first account.
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      ADMIN_PASSWORD_RESET: "${ADMIN_PASSWORD_RESET:-}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-auto}"
      SESSION_TTL_DAYS: "${SESSION_TTL_DAYS:-30}"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      # Read by uvicorn itself: without it, X-Forwarded-Proto from a reverse
      # proxy in another container is ignored and OIDC redirect URIs come out http://.
      FORWARDED_ALLOW_IPS: "${FORWARDED_ALLOW_IPS:-127.0.0.1}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
